apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: gitea-https
  namespace: anubis
  annotations:
    kubernetes.io/ingress.class: traefik
  labels:
    app.kubernetes.io/name: anubis
    app.kubernetes.io/part-of: ingress-protection
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`git.example.com`)
      services:
        - name: anubis
          port: 8080
  tls:
    secretName: gitea-tls
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: gitea-http
  namespace: anubis
  annotations:
    kubernetes.io/ingress.class: traefik
  labels:
    app.kubernetes.io/name: anubis
    app.kubernetes.io/part-of: ingress-protection
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`git.example.com`)
      middlewares:
        - name: https-redirect
      services:
        - name: anubis
          port: 8080
